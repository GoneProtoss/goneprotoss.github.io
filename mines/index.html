<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mines</title>
    <style>
        body {
            background-color: rgba(192,192,192,1);
        }
        .mine-field {
            margin: 0 auto;
            border-top: 3px solid rgba(128,128,128,1);
            border-left: 3px solid rgba(128,128,128,1);
            border-right: 3px solid white;
            border-bottom: 3px solid white;
            width: 64px;
        }
        .row {
            display: flex;
        }
        .cell {
            box-sizing: border-box;
            width: 16px;
            height: 16px;
        }
        .cell-unknown {
            border-top: 2px solid white;
            border-left: 2px solid white;
            border-right: 2px solid rgba(128,128,128,1);
            border-bottom: 2px solid rgba(128,128,128,1);
        }
        .cell-solved {
            border-top: 1px solid rgba(128,128,128,1);
            border-left: 1px solid rgba(128,128,128,1);
            border-right: none;
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="mine-field">
        <div class="row">
            <div class="cell cell-unknown"></div>
            <div class="cell cell-unknown"></div>
            <div class="cell cell-unknown"></div>
            <div class="cell cell-unknown"></div>
        </div>
        <div class="row">
            <div class="cell cell-unknown"></div>
            <div class="cell cell-solved"></div>
            <div class="cell cell-solved"></div>
            <div class="cell cell-unknown"></div>
        </div>
        <div class="row">
            <div class="cell cell-unknown"></div>
            <div class="cell cell-solved"></div>
            <div class="cell cell-solved"></div>
            <div class="cell cell-unknown"></div>
        </div>
        <div class="row">
            <div class="cell cell-unknown"></div>
            <div class="cell cell-unknown"></div>
            <div class="cell cell-unknown"></div>
            <div class="cell cell-unknown"></div>
        </div>
    </div>
    <script>
        var levels = {
            easy: {row: 9, col: 9, mine: 10},
            normal: {row: 16, col: 16, mine: 40},
            hard: {row: 16, col: 30, mine: 99}
        };

    </script>
</body>
</html>
